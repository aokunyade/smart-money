name: Refresh data and deploy

on:
  schedule:
    - cron: "0 11 1 * *"     # 1st of every month, 11:00 UTC
  workflow_dispatch:           # "Run workflow" button for manual refresh
  push:
    branches: [main]           # first upload triggers the initial build

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-deploy
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch SEC filings
        run: python scripts/fetch_filings.py

      - name: Resolve tickers and fetch market data
        run: python scripts/fetch_market_data.py

      - name: Build holdings.json and inject into dashboard
        run: python scripts/build_data.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json index.html
          git diff --cached --quiet || git commit -m "chore: monthly data refresh [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
