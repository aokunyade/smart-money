<script>
(function () {
  const D = window.HOLDINGS_DATA;
  if (!D) {
    document.getElementById("subtitle").textContent =
      "No data yet — run the pipeline (scripts/) or wait for the first GitHub Actions run.";
    return;
  }
  const CATS = [...new Set(D.funds.map(f => f.category))];
  const fundsByCat = c => D.funds.filter(f => f.category === c);

  // ---------- header ----------
  document.getElementById("subtitle").innerHTML =
    `min position <b>${D.params.min_weight_pct}%</b> · held by ≥ <b>${D.params.min_funds}</b> funds` +
    ` &nbsp;·&nbsp; Updated ${D.generated}`;
  document.querySelector("details.funds summary").textContent = `Funds (${D.funds.length})`;

  // ---------- fund panel ----------
  const fmtAum = v => v == null ? "—" :
    v >= 1e12 ? "$" + (v/1e12).toFixed(1) + "T" :
    v >= 1e9  ? "$" + (v/1e9).toFixed(1)  + "B" : "$" + (v/1e6).toFixed(0) + "M";
  const fg = document.getElementById("fundgrid");
  fg.innerHTML = CATS.map(c => `<h3>${c}</h3>` + fundsByCat(c).map(f => `
    <div class="fundrow"><span class="fn">${f.short}</span>
      <span class="fd">${(f.report || "").slice(0,7)}${f.type === "13F" ? " (13F)" : ""}</span>
      <span class="fa">${f.type === "13F" ? "—" : fmtAum(f.aum)}</span>
      <span class="fy ${f.ytd > 0 ? "pos" : f.ytd < 0 ? "neg" : "dim"}">${
        f.ytd == null ? "—" : (f.ytd > 0 ? "+" : "") + f.ytd.toFixed(1) + "%"}</span>
    </div>`).join("")).join("");

  // ---------- formatting ----------
  const fmtCap = v => v == null ? "—" :
    v >= 1e12 ? "$" + (v/1e12).toFixed(1) + "T" :
    v >= 1e9  ? "$" + (v/1e9).toFixed(1)  + "B" : "$" + (v/1e6).toFixed(0) + "M";
  const fmtRet = v => v == null ? '<span class="dim">—</span>' :
    `<span class="${v >= 0 ? "pos" : "neg"}">${v >= 0 ? "+" : ""}${v.toFixed(1)}%</span>`;
  const fmtDelta = (cur, prev, isNew) => isNew ? '<span class="gold">NEW</span>' :
    prev == null || prev === 0 ? '<span class="dim">—</span>' :
    fmtRet(Math.round(100 * (cur - prev) / prev));
  const flagMark = f => f === "up" ? '<span class="up">▲</span>' :
    f === "down" ? '<span class="down">▼</span>' :
    f === "new" ? '<span class="star">★</span>' : "";
  const cell = p => p == null ? '<span class="dim">—</span>' :
    `<span class="cellw">${p.w.toFixed(2)}%</span>${flagMark(p.flag)}`;

  // ---------- columns ----------
  const baseCols = [
    { key: "count", lab: "#", grp: "" },
    { key: "ticker", lab: "Ticker", grp: "", left: true, cls: "sticky1" },
    { key: "name", lab: "Company", grp: "", left: true, cls: "sticky2" },
    { key: "mktCap", lab: "Mkt Cap", grp: "" },
    { key: "ret1m", lab: "1M", grp: "Performance" }, { key: "ret3m", lab: "3M", grp: "Performance" },
    { key: "ret1y", lab: "1Y", grp: "Performance" }, { key: "ret3y", lab: "3Y", grp: "Performance" },
    { key: "ret5y", lab: "5Y", grp: "Performance" },
    { key: "val", lab: "Val", grp: "Valuation" },
    { key: "agg", lab: "Agg Wt", grp: "" }, { key: "dq", lab: "ΔQ", grp: "" },
  ];
  const fundCols = D.funds.map(f => ({ key: "f:" + f.id, lab: f.short, grp: f.category }));
  const COLS = baseCols.concat(fundCols);

  let sortKey = null, sortDir = -1;   // null = default order
  let filter = "";

  function value(s, key) {
    if (key.startsWith("f:")) { const p = s.positions[key.slice(2)]; return p ? p.w : -1; }
    if (key === "dq") return s.prevAgg ? (s.agg - s.prevAgg) / s.prevAgg : -999;
    const v = s[key];
    return v == null ? -1e15 : (typeof v === "string" ? v.toLowerCase() : v);
  }

  function render() {
    const thead = document.querySelector("#tbl thead");
    const groups = [];
    let i = 0;
    while (i < COLS.length) {
      let j = i;
      while (j < COLS.length && COLS[j].grp === COLS[i].grp) j++;
      groups.push({ name: COLS[i].grp, span: j - i });
      i = j;
    }
    thead.innerHTML =
      `<tr class="groups">${groups.map(g => `<th colspan="${g.span}">${g.name}</th>`).join("")}</tr>` +
      `<tr class="cols">${COLS.map(c =>
        `<th data-key="${c.key}" class="${c.left ? "l " : ""}${c.cls || ""}" title="${c.lab}">${c.lab}` +
        (sortKey === c.key ? ` <span class="sortind">${sortDir < 0 ? "▼" : "▲"}</span>` : "") +
        `</th>`).join("")}</tr>`;

    let rows = D.stocks.filter(s => !filter ||
      s.ticker.toLowerCase().includes(filter) || s.name.toLowerCase().includes(filter));
    if (sortKey) rows = rows.slice().sort((a, b) => {
      const va = value(a, sortKey), vb = value(b, sortKey);
      return (va < vb ? -1 : va > vb ? 1 : 0) * sortDir;
    });

    document.querySelector("#tbl tbody").innerHTML = rows.map(s => `<tr>
      <td>${s.count}</td>
      <td class="l sticky1"><b>${s.ticker}</b>${s.isNew ? '<span class="star">★</span>' : ""}${
        s.sp500 === false ? '<span class="nsp">non-SP</span>' : ""}</td>
      <td class="l sticky2" style="max-width:210px;overflow:hidden;text-overflow:ellipsis">${s.name}</td>
      <td>${fmtCap(s.mktCap)}</td>
      <td>${fmtRet(s.ret1m)}</td><td>${fmtRet(s.ret3m)}</td><td>${fmtRet(s.ret1y)}</td>
      <td>${fmtRet(s.ret3y)}</td><td>${fmtRet(s.ret5y)}</td>
      <td>${s.val != null ? s.val + '<span class="dim">' + s.valLabel + "</span>" : '<span class="dim">—</span>'}</td>
      <td><b>${s.agg.toFixed(1)}%</b></td>
      <td>${fmtDelta(s.agg, s.prevAgg, s.isNew)}</td>
      ${D.funds.map(f => `<td>${cell(s.positions[f.id])}</td>`).join("")}
    </tr>`).join("");

    const st = document.getElementById("status");
    if (sortKey && sortKey.startsWith("f:")) {
      const f = D.funds.find(f => "f:" + f.id === sortKey);
      st.textContent = `Sorted by weight for ${f.short} — click the column again to restore default order`;
    } else st.textContent = "";

    // measure sticky offset for second column
    const first = document.querySelector("tbody .sticky1") || document.querySelector("thead .sticky1");
    if (first) {
      const w = first.getBoundingClientRect().width;
      document.querySelectorAll(".sticky2").forEach(el => el.style.left = w + "px");
    }

    thead.querySelectorAll("th[data-key]").forEach(th => th.onclick = () => {
      const k = th.dataset.key;
      if (sortKey === k) {
        if (k.startsWith("f:")) { sortKey = null; }          // fund col: 2nd click restores
        else if (sortDir === -1) sortDir = 1;
        else { sortKey = null; sortDir = -1; }
      } else { sortKey = k; sortDir = -1; }
      render();
    });
  }

  document.getElementById("filter").addEventListener("input", e => {
    filter = e.target.value.trim().toLowerCase(); render();
  });
  render();
})();
</script>
</body>
</html>
